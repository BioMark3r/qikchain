name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            **/package-lock.json

      - name: Install npm dependencies for lockfiles
        run: |
          set -euo pipefail
          mapfile -t lockfiles < <(find . -name package-lock.json -type f | sort)
          if [ "${#lockfiles[@]}" -eq 0 ]; then
            echo "No package-lock.json files found; skipping npm ci"
            exit 0
          fi

          for lockfile in "${lockfiles[@]}"; do
            dir="$(dirname "$lockfile")"
            echo "Running npm ci in $dir"
            (cd "$dir" && npm ci)
          done

      - name: Run CI entrypoint
        env:
          CI_INTEGRATION: "1"
          RPC_URL: http://127.0.0.1:8545
        run: |
          set -euo pipefail
          bash scripts/ci/run.sh

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-failure-artifacts
          if-no-files-found: ignore
          path: |
            .logs
            .data
