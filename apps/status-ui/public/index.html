<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QikChain Status</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 20px; background:#f5f7fb; color:#17202a; }
      .panel { background:#fff; border:1px solid #e0e6ef; border-radius:10px; padding:14px; margin-bottom:14px; }
      .badge { display:inline-block; padding:4px 10px; border-radius:999px; color:#fff; font-size:12px; }
      .healthy { background:#198754; }
      .degraded { background:#dc3545; }
      .summary { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:10px; }
      .stat { background:#f8fafc; border:1px solid #e5eaf1; border-radius:8px; padding:8px; }
      .muted { color:#6b7280; font-size:12px; }
      .nodes { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:10px; }
      .node { background:#fff; border:1px solid #dde3ec; border-radius:10px; padding:10px; }
      .node.down { border-color:#f3b8c0; background:#fff5f7; }
      .state { display:inline-block; padding:2px 8px; border-radius:999px; color:#fff; font-size:11px; margin-bottom:8px; }
      .state.up { background:#198754; }
      .state.down { background:#dc3545; }
      .error { color:#b42332; font-size:12px; margin-top:8px; }
      .kv { font-size:13px; margin:2px 0; }
      .rpc { word-break:break-all; font-size:13px; margin-bottom:6px; }
      .warn { color:#b45309; font-weight:600; }
      button { margin-right:8px; margin-top:8px; padding:8px 12px; }
      button:disabled { opacity: 0.45; cursor: not-allowed; }
      textarea, input, select { width:100%; margin-top:8px; padding:8px; box-sizing:border-box; }
      textarea { min-height:80px; }
      pre { background:#0f172a; color:#e2e8f0; padding:10px; border-radius:8px; overflow:auto; }
      .banner { background:#fff3cd; border:1px solid #ffecb5; border-radius:8px; color:#7a5d00; padding:10px; margin-bottom:14px; display:none; }
      .row { margin-top: 8px; }
      .status-line { margin-top:8px; color:#6b7280; font-size:12px; }
      .status-line.error { color:#b42332; }
    </style>
  </head>
  <body>
    <h1>QikChain Status</h1>

    <div id="readonlyBanner" class="banner">Readonly mode enabled. Transaction actions are blocked.</div>

    <div class="panel">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">
        <div><strong>Overall:</strong> <span id="overallBadge" class="badge degraded">Loading</span></div>
        <div class="muted" id="timestamp">-</div>
      </div>
      <div class="muted" id="overallReason">-</div>
    </div>

    <div class="panel summary" id="summary"></div>

    <div class="panel" id="txPanel">
      <strong>Transactions</strong>
      <div class="row">
        <label for="txTokenInput" class="muted">Tx Token</label>
        <input id="txTokenInput" type="password" placeholder="Enter X-TX-TOKEN" />
      </div>
      <div class="row">
        <label for="txRpcSelect" class="muted">RPC target</label>
        <select id="txRpcSelect"></select>
      </div>
      <div class="status-line" id="txInlineStatus">Enter a token to enable actions.</div>
      <div>
        <button id="burnBtn">Send 1 wei → burn</button>
        <button id="deployBtn">Deploy test contract</button>
      </div>
      <details style="margin-top:8px;">
        <summary>Submit raw signed tx</summary>
        <textarea id="rawTxInput" placeholder="0x..."></textarea>
        <button id="rawSubmitBtn">Submit raw tx</button>
      </details>
      <pre id="txResult">No transaction submitted yet.</pre>
    </div>

    <div class="panel">
      <strong>Nodes</strong>
      <div class="muted" id="rpcConfig">Configured endpoints: -</div>
      <div class="nodes" id="nodes"></div>
    </div>

    <script>
      const overallBadge = document.getElementById('overallBadge');
      const overallReason = document.getElementById('overallReason');
      const timestamp = document.getElementById('timestamp');
      const summaryEl = document.getElementById('summary');
      const nodesEl = document.getElementById('nodes');
      const rpcConfig = document.getElementById('rpcConfig');
      const txResult = document.getElementById('txResult');
      const rawTxInput = document.getElementById('rawTxInput');
      const txTokenInput = document.getElementById('txTokenInput');
      const txRpcSelect = document.getElementById('txRpcSelect');
      const txInlineStatus = document.getElementById('txInlineStatus');
      const readonlyBanner = document.getElementById('readonlyBanner');
      const burnBtn = document.getElementById('burnBtn');
      const deployBtn = document.getElementById('deployBtn');
      const rawSubmitBtn = document.getElementById('rawSubmitBtn');

      const txState = {
        readonly: false,
        txEnabled: false,
        unauthorized: false,
        rpcUrls: [],
      };

      function canSubmitTx() {
        return Boolean(txTokenInput.value.trim()) && !txState.readonly && txState.txEnabled;
      }

      function updateTxControlState() {
        const disabled = !canSubmitTx();
        burnBtn.disabled = disabled;
        deployBtn.disabled = disabled;
        rawSubmitBtn.disabled = disabled;

        if (txState.readonly) {
          txInlineStatus.textContent = 'Readonly mode enabled';
          txInlineStatus.className = 'status-line error';
          return;
        }
        if (!txState.txEnabled) {
          txInlineStatus.textContent = 'Tx actions disabled on server';
          txInlineStatus.className = 'status-line error';
          return;
        }
        if (!txTokenInput.value.trim()) {
          txInlineStatus.textContent = 'Enter Tx Token to enable tx actions';
          txInlineStatus.className = 'status-line';
          return;
        }
        if (txState.unauthorized) {
          txInlineStatus.textContent = 'Unauthorized (check token)';
          txInlineStatus.className = 'status-line error';
          return;
        }

        txInlineStatus.textContent = 'Tx actions enabled';
        txInlineStatus.className = 'status-line';
      }

      function renderSummary(data) {
        const summary = data.summary || {};
        const divergence = Number(summary.headDivergence ?? 0);
        const divergenceWarn = Number(data.divergenceWarn ?? 3);
        const warn = divergence > divergenceWarn;
        const items = [
          ['NodesUp / NodesTotal', `${summary.nodesUp ?? '-'} / ${summary.nodesTotal ?? '-'}`],
          ['NodesSealing', summary.nodesSealing ?? '-'],
          ['Min block', summary.minBlockHead ?? '-'],
          ['Max block', summary.maxBlockHead ?? '-'],
          ['Head divergence', `${divergence}${warn ? ` (warning > ${divergenceWarn})` : ''}`],
          ['Chain ID', summary.chainId ?? 'unknown'],
          ['readonlyProd', String(Boolean(data.readonlyProd))],
          ['authEnabled', String(Boolean(data.authEnabled))],
          ['Tx features', data.writeMode || 'disabled'],
        ];

        summaryEl.innerHTML = items
          .map(([label, value]) => `<div class="stat"><div class="muted">${label}</div><strong class="${label === 'Head divergence' && warn ? 'warn' : ''}">${value}</strong></div>`)
          .join('');
      }

      function renderNodes(nodes) {
        nodesEl.innerHTML = (nodes || [])
          .map((node) => `
            <div class="node ${node.reachable ? '' : 'down'}">
              <div class="state ${node.reachable ? 'up' : 'down'}">${node.reachable ? 'Reachable' : 'Unreachable'}</div>
              <div class="rpc"><strong>${node.rpc}</strong></div>
              <div class="kv"><strong>chainId:</strong> ${node.chainId ?? '-'}</div>
              <div class="kv"><strong>net_peerCount:</strong> ${node.netPeerCount ?? '-'}</div>
              <div class="kv"><strong>eth_blockNumber:</strong> ${node.ethBlockNumber ?? '-'}</div>
              ${node.error ? `<div class="error">${node.error}</div>` : ''}
            </div>
          `)
          .join('');
      }

      function fillRpcSelect(rpcs) {
        const current = txRpcSelect.value;
        txRpcSelect.innerHTML = '';
        (rpcs || []).forEach((rpc, index) => {
          const option = document.createElement('option');
          option.value = rpc;
          option.textContent = rpc;
          if (current) {
            option.selected = rpc === current;
          } else {
            option.selected = index === 0;
          }
          txRpcSelect.appendChild(option);
        });
      }

      function renderTxResult(payload) {
        const hash = payload.txHash ? `txHash: ${payload.txHash}` : '';
        const address = payload.contractAddress ? `\ncontractAddress: ${payload.contractAddress}` : '';
        txResult.textContent = `${hash}${address}`.trim() || JSON.stringify(payload, null, 2);
      }

      async function postTx(path, body) {
        txState.unauthorized = false;
        updateTxControlState();
        try {
          const response = await fetch(path, {
            method: 'POST',
            headers: {
              'content-type': 'application/json',
              'x-tx-token': txTokenInput.value.trim(),
            },
            body: JSON.stringify({ ...(body || {}), rpcUrl: txRpcSelect.value || undefined }),
          });
          const payload = await response.json();
          if (!response.ok) {
            if (response.status === 401) {
              txState.unauthorized = true;
              updateTxControlState();
            }
            if (response.status === 403 && payload.error === 'readonly') {
              txState.readonly = true;
              readonlyBanner.style.display = 'block';
              updateTxControlState();
            }
            if (response.status === 503 && payload.error === 'tx_disabled') {
              txState.txEnabled = false;
              updateTxControlState();
            }
            txResult.textContent = `Error ${response.status}: ${payload.error || 'request failed'}`;
            return;
          }
          renderTxResult(payload);
        } catch (_error) {
          txResult.textContent = 'Failed to submit transaction request.';
        }
      }

      document.getElementById('burnBtn').addEventListener('click', () => postTx('/api/tx/send-wei', {}));
      document.getElementById('deployBtn').addEventListener('click', () => postTx('/api/tx/deploy-test-contract', {}));
      document.getElementById('rawSubmitBtn').addEventListener('click', () => postTx('/api/tx/send-raw', { rawTxHex: rawTxInput.value.trim() }));
      txTokenInput.addEventListener('input', () => {
        txState.unauthorized = false;
        updateTxControlState();
      });

      async function refreshConfig() {
        try {
          const response = await fetch('/api/config');
          const config = await response.json();
          txState.readonly = Boolean(config.readonly);
          txState.txEnabled = Boolean(config.txEnabled);
        } catch (_error) {
          txState.readonly = false;
          txState.txEnabled = false;
        }

        readonlyBanner.style.display = txState.readonly ? 'block' : 'none';
        updateTxControlState();
      }

      async function refresh() {
        try {
          const response = await fetch('/api/status');
          const data = await response.json();
          const healthy = Boolean(data.overall && data.overall.healthy);

          overallBadge.textContent = healthy ? 'Healthy' : 'Degraded';
          overallBadge.className = `badge ${healthy ? 'healthy' : 'degraded'}`;
          overallReason.textContent = data.overall?.reason || '-';
          timestamp.textContent = data.timestamp ? new Date(data.timestamp).toLocaleTimeString() : '-';

          const configuredCount = Number(data.configuredRpcs ?? (Array.isArray(data.nodes) ? data.nodes.length : 0));
          const configuredList = Array.isArray(data.rpcs) && data.rpcs.length > 0 ? ` (${data.rpcs.join(', ')})` : '';
          rpcConfig.textContent = `Configured endpoints: ${configuredCount}${configuredList}`;
          txState.rpcUrls = Array.isArray(data.rpcs) ? data.rpcs : [];
          fillRpcSelect(txState.rpcUrls);

          renderSummary(data);
          renderNodes(data.nodes);
          await refreshConfig();
        } catch (_error) {
          overallBadge.textContent = 'Error';
          overallBadge.className = 'badge degraded';
          overallReason.textContent = 'Failed to fetch /api/status';
        }
      }

      refresh();
      setInterval(refresh, 2000);
    </script>
  </body>
</html>
